version: "3.8"

services:
  # ─── MongoDB ────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: planeat-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: planeat
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: planeat
    volumes:
      - mongo_data:/data/db
    # ⚠️  ไม่ expose port ออก host เพื่อความปลอดภัย
    networks:
      - planeat-net

  # ─── Backend (FastAPI) ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: planeat-backend
    restart: unless-stopped
    ports:
      - "8001:8000"   # 8001 → หลีกเลี่ยง conflict กับ n8n
    environment:
      MONGO_URL: mongodb://planeat:${MONGO_PASSWORD}@mongodb:27017/planeat?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mongodb
    networks:
      - planeat-net

  # ─── Frontend (Next.js) ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: planeat-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"   # 3001 → หลีกเลี่ยง conflict
    environment:
      NEXT_PUBLIC_API_URL: http://${VPS_IP}:8001
    depends_on:
      - backend
    networks:
      - planeat-net

networks:
  planeat-net:
    driver: bridge

volumes:
  mongo_data:
    driver: local
